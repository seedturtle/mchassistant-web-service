<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCH Assistant - 語音助理</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">🏥 MCH Assistant</div>
        <div>
            <span class="session-id">Session: {{ session_id }}</span>
            <a href="/api/auth/logout" class="logout">登出</a>
        </div>
    </div>
    
    <div class="container">
        <div class="nav">
            <a href="/dashboard">🏠 主頁</a>
            <a href="/new">➕ 新建報告</a>
        </div>
        
        <h1>🎙️ 語音錄製</h1>
        <p class="subtitle">分段錄音，完成後合併產生報告</p>
        
        <div class="card">
            <h3>📋 報告類型</h3>
            <div style="display:flex; gap:8px; align-items:stretch;">
                <select id="reportType" class="select-full" style="flex:1;">
                    <option value="" disabled selected>載入中...</option>
                </select>
                <button id="manageTypesBtn" class="btn btn-secondary" style="white-space:nowrap; padding:12px 16px; font-size:18px; line-height:1; border-radius:10px;" title="管理報告類型">✏️</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📄 Word 模板</h3>
            <p class="hint">上傳 .docx 模板，使用 {'{' + '{'}content{'}' + '}'}、{'{' + '{'}date{'}' + '}'}、{'{' + '{'}report_type{'}' + '}'} 作為佔位符。</p>
            <p class="hint" style="font-size:12px; color:#4ade80;">📎 模板會依所選報告類型儲存，並同步上傳 Google Drive</p>
            <input type="file" id="templateFile" accept=".docx" class="file-input">
            <div id="templateStatus" class="template-status"></div>
            <div id="templateTypeStatus" class="template-status" style="margin-top:8px;"></div>
        </div>
        
        <div class="card recorder-card">
            <h3>🎤 錄音區段</h3>
            <div class="recorder-box">
                <button class="btn-record" id="recordBtn">🎤</button>
                <div class="status" id="status">點擊麥克風開始錄音</div>
            </div>
            
            <div id="segments" class="segments-container">
                <!-- Recorded segments will appear here -->
            </div>
            
            <button class="btn btn-danger" id="clearBtn">🗑️ 清空重置</button>
        </div>
        
        <div class="actions">
            <button class="btn btn-generate" id="generateBtn" disabled>📝 產生報告</button>
            <button class="btn btn-download" id="downloadBtn" disabled>📥 下載</button>
            <button class="btn btn-email" id="emailBtn" disabled>📧 Email</button>
        </div>
        
        <div id="result" class="result-box"></div>
    </div>
    
    <!-- Report Type Management Modal -->
    <div id="typeModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 管理報告類型</h3>
                <button id="closeModalBtn" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="type-list" id="typeList">
                    <!-- loaded dynamically -->
                </div>
                <div class="type-add">
                    <input type="text" id="newTypeName" class="input-full" placeholder="輸入新報告類型名稱..." maxlength="30">
                    <button id="addTypeBtn" class="btn btn-secondary" style="margin-top:8px; width:100%;">＋ 新增</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    const SESSION_ID = "{{ session_id }}";
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let segments = [];
    let hasTemplate = false;
    
    const recordBtn = document.getElementById('recordBtn');
    const status = document.getElementById('status');
    const segmentsDiv = document.getElementById('segments');
    const addSegmentBtn = document.getElementById('clearBtn');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const emailBtn = document.getElementById('emailBtn');
    const templateFile = document.getElementById('templateFile');
    const templateStatus = document.getElementById('templateStatus');
    const reportType = document.getElementById('reportType');
    const result = document.getElementById('result');
    
    // Template upload
    templateFile.onchange = async () => {
        if (templateFile.files.length > 0) {
            const file = templateFile.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('session_id', SESSION_ID);
            formData.append('report_type', reportType ? reportType.value : 'template');
            
            try {
                const res = await fetch('/api/sessions/' + SESSION_ID + '/template', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    hasTemplate = true;
                    const typeName = reportType.options[reportType.selectedIndex]?.textContent || '';
                    templateStatus.innerHTML = '<span class="success">✓ 已上傳：' + file.name + '（' + typeName + '）</span>';
                    if (data.drive_status) {
                        templateStatus.innerHTML += '<br><span style="font-size:12px; color:#4ade80;">' + data.drive_status + '</span>';
                    }
                    checkGenerateReady();
                } else {
                    templateStatus.innerHTML = '<span class="error">上傳失敗：' + data.error + '</span>';
                }
            } catch (e) {
                templateStatus.innerHTML = '<span class="error">上傳失敗</span>';
            }
        }
    };
    
    // Recording
    recordBtn.onclick = async () => {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const res = await fetch('/api/sessions/' + SESSION_ID + '/segment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ audio_data: base64, format: 'webm' })
                        });
                        const data = await res.json();
                        if (data.success) {
                            segments.push({ id: data.segment_id, text: data.transcription });
                            renderSegments();
                            addSegmentBtn.disabled = false;
                            checkGenerateReady();
                        }
                    } catch (e) {
                        alert('轉換失敗');
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
            };
            mediaRecorder.start();
            isRecording = true;
            recordBtn.textContent = '⏹️';
            status.textContent = '錄音中...';
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.textContent = '🎤';
            status.textContent = '錄音完成';
        }
    };
    
    function renderSegments() {
        segmentsDiv.innerHTML = segments.map((seg, i) => 
            '<div class="segment-item"><strong>段落' + (i+1) + ':</strong> ' + seg.text + '</div>'
        ).join('');
    }
    
    function checkGenerateReady() {
        const ready = segments.length > 0;
        generateBtn.disabled = !ready;
    }
    
    addSegmentBtn.onclick = async () => {
        if (!confirm('確定要清空所有段落嗎？')) return;
        try {
            const res = await fetch('/api/sessions/' + SESSION_ID + '/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await res.json();
            if (data.success) {
                segments = [];
                renderSegments();
                addSegmentBtn.disabled = true;
                checkGenerateReady();
                result.innerHTML = '';
                downloadBtn.disabled = true;
                emailBtn.disabled = true;
            }
        } catch (e) {
            alert('清空失敗');
        }
    };
    
    generateBtn.onclick = async () => {
        generateBtn.textContent = '處理中...';
        generateBtn.disabled = true;
        try {
            const res = await fetch('/api/sessions/' + SESSION_ID + '/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ report_type: reportType.value })
            });
            const data = await res.json();
            if (data.success) {
                result.innerHTML = '<div class="success">✓ 報告已產生！</div>';
                downloadBtn.disabled = false;
                emailBtn.disabled = false;
            } else {
                result.innerHTML = '<div class="error">產生失敗：' + data.error + '</div>';
            }
        } catch (e) {
            result.innerHTML = '<div class="error">錯誤：' + e.message + '</div>';
        }
        generateBtn.textContent = '📝 產生報告';
        generateBtn.disabled = false;
    };
    
    downloadBtn.onclick = () => {
        window.location.href = '/api/sessions/' + SESSION_ID + '/download';
    };
    
    emailBtn.onclick = async () => {
        const email = prompt('請輸入收件者 Email:');
        if (email) {
            emailBtn.textContent = '發送中...';
            emailBtn.disabled = true;
            try {
                const res = await fetch('/api/sessions/' + SESSION_ID + '/email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to_email: email })
                });
                const data = await res.json();
                if (data.success) {
                    alert('✓ 郵件已發送至 ' + email);
                } else {
                    alert('發送失敗：' + data.error);
                }
            } catch (e) {
                alert('錯誤：' + e.message);
            }
            emailBtn.textContent = '📧 Email';
            emailBtn.disabled = false;
        }
    };
    
    // ══════════════════════════════════════════
    // Report Type Management
    // ══════════════════════════════════════════
    const manageTypesBtn = document.getElementById('manageTypesBtn');
    const typeModal = document.getElementById('typeModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const typeList = document.getElementById('typeList');
    const newTypeName = document.getElementById('newTypeName');
    const addTypeBtn = document.getElementById('addTypeBtn');
    
    async function loadReportTypes() {
        try {
            const [typesRes, tmplRes] = await Promise.all([
                fetch('/api/report-types'),
                fetch('/api/sessions/' + SESSION_ID + '/template')
            ]);
            const typesData = await typesRes.json();
            const tmplData = await tmplRes.json();
            const templates = tmplData.templates || {};
            
            reportType.innerHTML = '';
            typesData.types.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                const hasTmpl = templates[t.id] ? ' 📋' : '';
                opt.textContent = t.name + hasTmpl;
                reportType.appendChild(opt);
            });
            
            renderTypeList(typesData.types, templates);
        } catch (e) {
            console.error('Failed to load report types:', e);
        }
    }
    
    function renderTypeList(types, templates) {
        templates = templates || {};
        typeList.innerHTML = types.map(t => {
            const isDefault = ['general','medical','meeting','swallow','ent'].includes(t.id);
            const hasTmpl = templates[t.id] ? ' 📋' : '';
            return '<div class="type-list-item">' +
                '<span class="type-name">' + escapeHtml(t.name) + hasTmpl + '</span>' +
                (isDefault ? '<span class="type-badge">預設</span>' : '<button class="type-delete-btn" data-id="' + t.id + '" title="刪除">✕</button>') +
            '</div>';
        }).join('');
        
        document.querySelectorAll('.type-delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const typeId = btn.dataset.id;
                const name = btn.parentElement.querySelector('.type-name').textContent;
                if (!confirm('確定刪除「' + name + '」？')) return;
                try {
                    const res = await fetch('/api/report-types/' + typeId, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        await loadReportTypes();
                    } else {
                        alert('刪除失敗：' + (data.detail || data.error || '未知錯誤'));
                    }
                } catch (e) {
                    alert('刪除失敗：' + e.message);
                }
            });
        });
    }
    
    if (manageTypesBtn) {
        manageTypesBtn.addEventListener('click', () => {
            typeModal.style.display = 'flex';
            loadReportTypes();
        });
    }
    
    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', () => {
            typeModal.style.display = 'none';
        });
    }
    
    if (typeModal) {
        typeModal.addEventListener('click', (e) => {
            if (e.target === typeModal) typeModal.style.display = 'none';
        });
    }
    
    if (addTypeBtn) {
        addTypeBtn.addEventListener('click', async () => {
            const name = newTypeName.value.trim();
            if (!name) { alert('請輸入報告類型名稱'); return; }
            try {
                const res = await fetch('/api/report-types', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
                const data = await res.json();
                if (data.success) {
                    newTypeName.value = '';
                    await loadReportTypes();
                } else {
                    alert('新增失敗：' + (data.detail || data.error || '未知錯誤'));
                }
            } catch (e) {
                alert('新增失敗：' + e.message);
            }
        });
        
        newTypeName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTypeBtn.click();
        });
    }
    
    // Load report types on startup
    loadReportTypes();
    </script>
</body>
</html>
